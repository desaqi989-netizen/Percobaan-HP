<!DOCTYPE html>
<html>
<head>
<title>Internasional Soil Sciens</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&display=swap" rel="stylesheet">

<style>

body{
margin:0;
background:#4b3222;
font-family:Arial;
}

/* ===================== DESKTOP ===================== */

.desktop-layout{
display:block;
}

.mobile-layout{
display:none;
}

/* HERO DESKTOP */

.hero{
position:relative;
width:100%;
height:60vh;
overflow:hidden;
}

.hero img{
width:100%;
height:190%;
object-fit:cover;
filter:brightness(70%);
animation:gerakHero 3s ease-in-out infinite alternate;
}

@keyframes gerakHero{
0%{transform:translateY(0);}
100%{transform:translateY(-400px);}
}

.judul-box{
position:absolute;
bottom:40px;
left:50%;
transform:translateX(-50%);
background:rgba(123,79,44,0.9);
padding:15px 40px;
border-radius:25px;
}

.judul{
font-family:'Montserrat';
font-size:30px;
color:white;
margin:0;
letter-spacing:2px;
}

/* KONTEN DESKTOP */

.container{
display:flex;
justify-content:space-between;
width:90%;
margin:auto;
margin-top:40px;
}

.sidebar{
width:220px;
display:flex;
flex-direction:column;
gap:20px;
}

.sidebar img{
width:100%;
height:150px;
object-fit:cover;
border-radius:15px;
}

.menu{
width:300px;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
gap:22px;
}

.menu a{
width:230px;
height:70px;
display:flex;
align-items:center;
justify-content:center;
text-decoration:none;
font-family:'Montserrat';
font-size:24px;
font-weight:900;
background:#7b4f2c;
color:white;
border-radius:40px;
}

/* ===================== MOBILE ===================== */

@media(max-width:768px){

.desktop-layout{
display:none;
}

.mobile-layout{
display:block;
}

/* HERO HP */

.hero-mobile{
position:relative;
width:100%;
height:36vh;
overflow:hidden;
background:#4b3222;
}

.hero-mobile img{
width:100%;
height:100%;
object-fit:contain;
object-position:center;
filter:brightness(70%);
animation:gerakHP 1.8s linear infinite alternate;
}

@keyframes gerakHP{
0%{transform:translateY(0);}
100%{transform:translateY(-80px);}
}

.judul-box-mobile{
position:absolute;
bottom:20px;
left:50%;
transform:translateX(-50%);
background:rgba(123,79,44,0.9);
padding:12px 35px;
border-radius:20px;
width:260px;
}

.judul-mobile{
font-family:'Montserrat';
font-size:15px;
color:white;
margin:0;
text-align:justify;
text-align-last:justify;
letter-spacing:1px;
}

/* SLIDER */

.slider{
width:95%;
margin:auto;
overflow:hidden;
margin-top:20px;
}

.slider-track{
display:flex;
gap:15px;
animation:slide 3s linear infinite;
}

.slider img{
width:150px;
height:100px;
object-fit:cover;
border-radius:12px;
flex-shrink:0;
}

@keyframes slide{
0%{transform:translateX(0);}
100%{transform:translateX(-50%);}
}

/* MENU MOBILE */

.menu-mobile{
display:flex;
flex-direction:column;
align-items:center;
gap:15px;
margin-top:25px;
}

.menu-mobile a{
width:70%;
height:50px;
display:flex;
align-items:center;
justify-content:center;
background:#7b4f2c;
color:white;
font-family:'Montserrat';
text-decoration:none;
border-radius:30px;
}

/* SLIDER BAWAH */

.slider2{
width:95%;
margin:auto;
overflow:hidden;
margin-top:30px;
}

.slider2-track{
display:flex;
gap:15px;
animation:slide2 3s linear infinite;
}

.slider2 img{
width:150px;
height:100px;
object-fit:cover;
border-radius:12px;
flex-shrink:0;
}

@keyframes slide2{
0%{transform:translateX(-50%);}
100%{transform:translateX(0);}
}

}

</style>
</head>

<body>
