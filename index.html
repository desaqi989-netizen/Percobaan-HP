<style>
body{
    margin:0;
    background:#4b3222;
    font-family:Arial, sans-serif;
}

/* ================= DESKTOP ================= */

.hero{
    position:relative;
    width:100%;
    height:60vh;
    overflow:hidden;
}

.hero img{
    width:100%;
    height:100%;
    object-fit:cover;
    filter:brightness(65%);
    animation:gerakDesktop 6s ease-in-out infinite alternate;
}

@keyframes gerakDesktop{
    0%{transform:translateY(0);}
    100%{transform:translateY(-40px);}
}

.judul-box{
    position:absolute;
    bottom:40px;
    left:50%;
    transform:translateX(-50%);
    background:rgba(123,79,44,0.9);
    padding:15px 40px;
    border-radius:25px;
}

.judul{
    font-family:'Montserrat',sans-serif;
    font-size:30px;
    color:white;
    margin:0;
    text-transform:uppercase;
}

.container{
    display:flex;
    justify-content:space-between;
    width:90%;
    margin:40px auto;
}

.sidebar{
    width:200px;
    display:flex;
    flex-direction:column;
    gap:20px;
}

.sidebar img{
    width:100%;
    height:140px;
    object-fit:cover;
    border-radius:18px;
}

.menu{
    width:280px;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:space-between;
}

.menu a{
    width:220px;
    height:70px;
    display:flex;
    align-items:center;
    justify-content:center;
    text-decoration:none;
    font-family:'Montserrat',sans-serif;
    font-weight:900;
    font-size:24px;
    color:white;
    background:#7b4f2c;
    border-radius:40px;
}

/* ================= MOBILE ================= */

@media(max-width:768px){

/* HERO DI HP */
.hero{
    height:40vh;
}

.hero img{
    width:100%;
    height:100%;
    object-fit:cover;
    object-position:center;
    filter:brightness(65%);
    animation:gerakHP 6s ease-in-out infinite alternate;
}

/* animasi khusus hp */
@keyframes gerakHP{
    0%{transform:scale(1.1) translateY(0);}
    100%{transform:scale(1.1) translateY(-60px);}
}

/* judul lebih kecil */
.judul-box{
    width:85%;
    bottom:20px;
    padding:10px;
}

.judul{
    font-size:18px;
    text-align:center;
}

/* layout jadi vertikal */
.container{
    flex-direction:column;
    align-items:center;
    gap:40px;
}

/* sidebar jadi slider */
.sidebar{
    flex-direction:row;
    overflow:hidden;
    width:100%;
}

/* track foto */
.sidebar-track{
    display:flex;
    gap:15px;
    animation:scrollHP 10s linear infinite;
}

/* foto */
.sidebar img{
    width:170px;
    height:120px;
    object-fit:cover;
    border-radius:18px;
    flex-shrink:0;
}

/* animasi slide */
@keyframes scrollHP{
    from{transform:translateX(0);}
    to{transform:translateX(-50%);}
}

/* menu */
.menu{
    gap:25px;
}

.menu a{
    width:85%;
    height:60px;
    font-size:18px;
}

}
</style>
